exp_tag : ngsim0-1   # ckpts/{exp_tag}/, tensorboard/{exp_tag}/ 에 저장됨

# =========================
# DATA
# =========================
data:
  mmap_dir   : data/NGSIM/c0
  splits_dir : data/NGSIM/splits
  stats_dir  : data/NGSIM/stats_c0

  hz          : 3.0
  batch_size  : 1024
  num_workers : 64

  # scenario labels (optional — 없으면 stratified eval/sampling 비활성화)
  scenario_labels: data/NGSIM/c0/scenario_labels.csv


# =========================
# FEATURES
# stats 파일명은 이 설정으로 자동 결정됨
# e.g. ego_mode=p, nb_kin_mode=pva, use_gate=true → ego_p__pva_gate.npz
# =========================
features:
  ego_mode     : pva        # p=[x,y] | pv=[x,y,vx,vy] | pva=[x,y,vx,vy,ax,ay]
  nb_kin_mode  : pva      # p | v | a | pv | pa | va | pva | none
  use_lc_state : false
  use_dx_time  : false
  use_lit      : false
  use_lis      : false
  use_gate     : false
  use_I_x      : false
  use_I_y      : false
  use_I        : false


# =========================
# MODEL
# ego_dim / nb_dim 은 features 설정에서 자동 계산됩니다
# =========================
model:
  name      : encdecformer
  T         : 6
  Tf        : 15
  K         : 8

  use_neighbors : true

  d_model    : 128
  nhead      : 4
  enc_layers : 3
  dec_layers : 3
  dropout    : 0.1

  M             : 6
  return_scores : true


# =========================
# TRAIN
# =========================
train:
  device : cuda
  seed   : 42

  epochs        : 100
  lr            : 3e-4
  weight_decay  : 0.0
  use_amp       : false
  grad_clip_norm: 1.0

  # loss weights
  w_ade  : 1.0
  w_fde  : 0.0
  w_rmse : 1.0
  w_cls  : 0.1

  # scheduler
  lr_schedule  : cosine   # none | cosine
  warmup_steps : 500

  # logging / ckpt
  monitor   : val_ade     # val_loss | val_ade | val_fde | val_rmse
  ckpt_dir  : ckpts

  stratified_eval: false