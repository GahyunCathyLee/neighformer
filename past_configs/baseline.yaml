exp_tag : baseline   # ckpts/{exp_tag}/, tensorboard/{exp_tag}/ 에 저장됨

# =========================
# DATA
# =========================
data:
  mmap_dir   : data/highD/mmap
  splits_dir : data/highD/splits
  stats_dir  : data/highD/stats

  hz          : 3.0
  batch_size  : 512
  num_workers : 64

  # scenario labels (optional — 없으면 stratified eval/sampling 비활성화)
  scenario_labels: data/highD/mmap/scenario_labels.csv


# =========================
# FEATURES
# stats 파일명은 이 설정으로 자동 결정됨
# e.g. ego_mode=p, nb_kin_mode=pva, use_gate=true → ego_p__pva_gate.npz
# =========================
features:
  ego_mode     : p        # p=[x,y] | pv=[x,y,vx,vy] | pva=[x,y,vx,vy,ax,ay]
  nb_kin_mode  : p      # p | v | a | pv | pa | va | pva | none
  use_lc_state : false
  use_dx_time  : false
  use_gate     : false
  use_I_x      : false
  use_I_y      : false
  use_I        : false


# =========================
# MODEL
# ego_dim / nb_dim 은 features 설정에서 자동 계산됩니다
# =========================
model:
  name      : encdecformer
  T         : 6
  Tf        : 15
  K         : 8

  use_neighbors : true

  d_model    : 128
  nhead      : 4
  enc_layers : 3
  dec_layers : 3
  dropout    : 0.0

  M             : 6
  return_scores : true


# =========================
# TRAIN
# =========================
train:
  device : cuda
  seed   : 42

  epochs        : 300
  lr            : 3e-4
  weight_decay  : 0.0
  use_amp       : false
  grad_clip_norm: 1.0

  # loss weights
  w_ade  : 1.0
  w_fde  : 0.0
  w_rmse : 1.0
  w_cls  : 0.1

  # scheduler
  lr_schedule  : cosine   # none | cosine
  warmup_steps : 500

  # logging / ckpt
  monitor   : val_ade     # val_loss | val_ade | val_fde | val_rmse
  ckpt_dir  : ckpts

  stratified_eval: false


# =========================
# SCENARIO SAMPLING (optional)
# scenario_labels가 있을 때만 활성화됨
# =========================
# scenario_sampling:
#   mode          : event   # event | state
#   alpha         : 0.5
#   unknown_weight: 0.0
#   clip_max      : ~